<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Dojo</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf8f2;
      --card-bg: #ffffff;
      --text: #2c2c2a;
      --muted: #888780;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --radius: 20px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    header p {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .star-icon {
      display: inline-block;
      font-size: 1.8rem;
      vertical-align: middle;
      margin-right: 0.3rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      max-width: 760px;
      margin: 0 auto 2.5rem;
    }

    .kid-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.75rem;
      border: 2px solid transparent;
      transition: transform 0.2s ease;
    }

    .kid-card:hover { transform: translateY(-2px); }

    .kid-card.kid-1 { border-color: #f0997b; }
    .kid-card.kid-2 { border-color: #5dcaa5; }

    .kid-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 900;
      flex-shrink: 0;
    }

    .kid-1 .avatar { background: #faece7; color: #d85a30; }
    .kid-2 .avatar { background: #e1f5ee; color: #1d9e75; }

    .kid-name-wrap h2 {
      font-size: 1.3rem;
      font-weight: 900;
    }

    .kid-name-wrap span {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .score-display {
      text-align: center;
      margin: 1.25rem 0 1.5rem;
      padding: 1rem;
      border-radius: 14px;
    }

    .kid-1 .score-display { background: #faece7; }
    .kid-2 .score-display { background: #e1f5ee; }

    .score-display .pts {
      font-size: 3.5rem;
      font-weight: 900;
      line-height: 1;
      display: block;
    }

    .kid-1 .score-display .pts { color: #d85a30; }
    .kid-2 .score-display .pts { color: #1d9e75; }

    .score-display .pts-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .add-btn {
      flex: 1;
      padding: 0.7rem 0.5rem;
      border: none;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    .add-btn:active { transform: scale(0.94); }
    .add-btn:hover { filter: brightness(1.08); }

    .kid-1 .add-btn { background: #f0997b; color: #4a1b0c; }
    .kid-2 .add-btn { background: #5dcaa5; color: #04342c; }

    .sub-btn {
      flex: 1;
      padding: 0.7rem 0.5rem;
      border: 2px solid;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      background: transparent;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .sub-btn:active { transform: scale(0.94); }

    .kid-1 .sub-btn { border-color: #f0997b; color: #d85a30; }
    .kid-1 .sub-btn:hover { background: #faece7; }
    .kid-2 .sub-btn { border-color: #5dcaa5; color: #1d9e75; }
    .kid-2 .sub-btn:hover { background: #e1f5ee; }

    .divider {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-align: center;
      margin: 0.4rem 0;
    }

    .reset-btn {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.55rem;
      border: 1.5px dashed var(--border);
      background: transparent;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .reset-btn:hover { color: #e24b4a; border-color: #e24b4a; }

    /* History log */
    .history-wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .history-wrap h3 {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .log-entry {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--card-bg);
      border-radius: 10px;
      padding: 0.5rem 0.85rem;
      font-size: 0.9rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .log-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .log-dot.k1 { background: #f0997b; }
    .log-dot.k2 { background: #5dcaa5; }

    .log-name { font-weight: 700; flex: 1; }
    .log-pts { font-weight: 900; }
    .log-pts.pos { color: #3b6d11; }
    .log-pts.neg { color: #a32d2d; }
    .log-time { font-size: 0.75rem; color: var(--muted); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2c2c2a;
      color: #fff;
      padding: 0.65rem 1.4rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Name edit */
    .kid-name-wrap h2 {
      cursor: pointer;
      border-bottom: 1.5px dashed transparent;
      transition: border-color 0.15s;
    }
    .kid-name-wrap h2:hover { border-color: var(--muted); }

    .name-input {
      font-family: 'Nunito', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      border: none;
      border-bottom: 2px solid;
      background: transparent;
      outline: none;
      width: 130px;
    }

    .kid-1 .name-input { border-color: #d85a30; color: var(--text); }
    .kid-2 .name-input { border-color: #1d9e75; color: var(--text); }

    .clear-history-btn {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      float: right;
      font-family: 'Nunito', sans-serif;
      padding: 0;
    }
    .clear-history-btn:hover { color: #e24b4a; }
  </style>
</head>
<body>

<header>
  <h1><span class="star-icon">⭐</span> Home Dojo</h1>
  <p>Earn points for great choices</p>
</header>

<div class="grid">
  <!-- Kid 1 -->
  <div class="kid-card kid-1" id="card-0">
    <div class="kid-header">
      <div class="avatar" id="avatar-0">K1</div>
      <div class="kid-name-wrap">
        <h2 id="name-display-0" title="Click to edit name">Kid 1</h2>
        <span>Points tracker</span>
      </div>
    </div>
    <div class="score-display">
      <span class="pts" id="score-0">0</span>
      <span class="pts-label">total points</span>
    </div>
    <div class="btn-row">
      <button class="add-btn" onclick="addPoints(0, 1)">+1</button>
      <button class="add-btn" onclick="addPoints(0, 3)">+3</button>
      <button class="add-btn" onclick="addPoints(0, 5)">+5</button>
    </div>
    <div class="divider">remove points</div>
    <div class="btn-row">
      <button class="sub-btn" onclick="addPoints(0, -1)">−1</button>
      <button class="sub-btn" onclick="addPoints(0, -3)">−3</button>
      <button class="sub-btn" onclick="addPoints(0, -5)">−5</button>
    </div>
    <button class="reset-btn" onclick="resetScore(0)">Reset to 0</button>
  </div>

  <!-- Kid 2 -->
  <div class="kid-card kid-2" id="card-1">
    <div class="kid-header">
      <div class="avatar" id="avatar-1">K2</div>
      <div class="kid-name-wrap">
        <h2 id="name-display-1" title="Click to edit name">Kid 2</h2>
        <span>Points tracker</span>
      </div>
    </div>
    <div class="score-display">
      <span class="pts" id="score-1">0</span>
      <span class="pts-label">total points</span>
    </div>
    <div class="btn-row">
      <button class="add-btn" onclick="addPoints(1, 1)">+1</button>
      <button class="add-btn" onclick="addPoints(1, 3)">+3</button>
      <button class="add-btn" onclick="addPoints(1, 5)">+5</button>
    </div>
    <div class="divider">remove points</div>
    <div class="btn-row">
      <button class="sub-btn" onclick="addPoints(1, -1)">−1</button>
      <button class="sub-btn" onclick="addPoints(1, -3)">−3</button>
      <button class="sub-btn" onclick="addPoints(1, -5)">−5</button>
    </div>
    <button class="reset-btn" onclick="resetScore(1)">Reset to 0</button>
  </div>
</div>

<!-- History -->
<div class="history-wrap">
  <h3>Recent activity <button class="clear-history-btn" onclick="clearHistory()">Clear all</button></h3>
  <div class="log-list" id="log-list">
    <div style="color: var(--muted); font-size: 0.9rem; padding: 0.5rem 0.85rem;">No activity yet — start awarding points!</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STATE_KEY = 'home_dojo_v2';

  let state = {
    names: ['Kid 1', 'Kid 2'],
    scores: [0, 0],
    log: []
  };

  function load() {
    try {
      const saved = localStorage.getItem(STATE_KEY);
      if (saved) state = JSON.parse(saved);
    } catch(e) {}
    render();
  }

  function save() {
    try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0,2).join('');
  }

  function render() {
    for (let i = 0; i < 2; i++) {
      document.getElementById('score-' + i).textContent = state.scores[i];
      const nd = document.getElementById('name-display-' + i);
      if (nd) nd.textContent = state.names[i];
      document.getElementById('avatar-' + i).textContent = initials(state.names[i]);
    }
    renderLog();
  }

  function renderLog() {
    const el = document.getElementById('log-list');
    if (state.log.length === 0) {
      el.innerHTML = '<div style="color: var(--muted); font-size: 0.9rem; padding: 0.5rem 0.85rem;">No activity yet — start awarding points!</div>';
      return;
    }
    el.innerHTML = state.log.slice().reverse().map(entry => `
      <div class="log-entry">
        <div class="log-dot ${entry.kid === 0 ? 'k1' : 'k2'}"></div>
        <span class="log-name">${entry.name}</span>
        <span class="log-pts ${entry.pts > 0 ? 'pos' : 'neg'}">${entry.pts > 0 ? '+' : ''}${entry.pts} pts</span>
        <span class="log-time">${entry.time}</span>
      </div>
    `).join('');
  }

  function addPoints(kid, pts) {
    state.scores[kid] = Math.max(0, state.scores[kid] + pts);
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    state.log.push({ kid, name: state.names[kid], pts, time });
    if (state.log.length > 50) state.log.shift();
    save();
    render();
    const verb = pts > 0 ? '🎉 ' : '';
    showToast(`${verb}${state.names[kid]}: ${pts > 0 ? '+' : ''}${pts} points!`);
    // Animate the score
    const el = document.getElementById('score-' + kid);
    el.style.transform = 'scale(1.3)';
    el.style.transition = 'transform 0.15s ease';
    setTimeout(() => { el.style.transform = 'scale(1)'; }, 150);
  }

  function resetScore(kid) {
    if (!confirm(`Reset ${state.names[kid]}'s points to 0?`)) return;
    state.scores[kid] = 0;
    state.log.push({ kid, name: state.names[kid], pts: 'reset', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
    save();
    render();
    showToast(`${state.names[kid]} reset to 0`);
  }

  function clearHistory() {
    if (!confirm('Clear all activity history?')) return;
    state.log = [];
    save();
    renderLog();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // Inline name editing
  function makeEditable(kid) {
    const display = document.getElementById('name-display-' + kid);
    const current = state.names[kid];
    const input = document.createElement('input');
    input.className = 'name-input';
    input.value = current;
    input.maxLength = 20;
    display.replaceWith(input);
    input.focus();
    input.select();

    function commit() {
      const newName = input.value.trim() || current;
      state.names[kid] = newName;
      save();
      const h2 = document.createElement('h2');
      h2.id = 'name-display-' + kid;
      h2.title = 'Click to edit name';
      h2.textContent = newName;
      h2.onclick = () => makeEditable(kid);
      input.replaceWith(h2);
      document.getElementById('avatar-' + kid).textContent = initials(newName);
    }

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = current; input.blur(); } });
  }

  document.getElementById('name-display-0').addEventListener('click', () => makeEditable(0));
  document.getElementById('name-display-1').addEventListener('click', () => makeEditable(1));

  load();
</script>
</body>
</html>
